[channels.slack]
app_token = "$SLACK_APP_TOKEN"
bot_token = "$SLACK_BOT_TOKEN"
profile   = "default"

[gateway]
approval_allowlist       = []
approval_mode            = "allow_all"
delivery_context_ttl_hours = 4
prune_after_hours        = 168
store                    = "/root/.stakpak/autopilot/gateway.db"
title_template           = "{channel} / {peer}"

[notifications]
channel     = "slack"
chat_id     = "stakpak-agent-database"
gateway_url = "http://127.0.0.1:4096"

[routing]
bindings  = []
dm_scope  = "per_channel_peer"

[[schedules]]
name    = "daily-backup-validation"
cron    = "0 2 * * *"
channel = "slack"
profile = "default"
sandbox = false
prompt  = "Run the full database backup validation pipeline by executing: bash /root/.stakpak/scripts/run_validation.sh. Report the final result clearly showing PASS or FAIL for each check."

[[schedules]]
name    = "quick-integrity-check"
cron    = "0 */6 * * *"
channel = "slack"
profile = "default"
sandbox = false
prompt  = "Run only the integrity check on the latest backup file in /root/.stakpak/backups/. Read /root/.stakpak/backups/latest.txt to find the latest backup filename, then verify its SHA256 checksum matches the .sha256 file. Report PASS or FAIL."

[server]
listen      = "127.0.0.1:4096"
sandbox_mode = "ephemeral"
